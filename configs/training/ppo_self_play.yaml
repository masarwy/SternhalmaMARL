env_config:
  num_players: 2
  board_diagonal: 5
  max_actions: 128
  max_agent_steps: 3000
  reward_mode: potential_shaped
  reward_scale: 0.01
  reward_clip_abs: 5.0
  render_mode: null

training_config:
  num_iterations: 100
  checkpoint_every: 10
  seed: 42
  stop_reward: null

rllib_config:
  framework: torch
  use_new_api_stack: true
  num_gpus: 0.0
  num_env_runners: 2
  num_envs_per_env_runner: 1
  rollout_fragment_length: 400
  batch_mode: complete_episodes
  train_batch_size: 8000
  minibatch_size: 512
  num_epochs: 5
  lr: 1e-5
  entropy_coeff: 0.003
  gamma: 0.99
  lambda: 0.95

ray_config:
  local_mode: false
  log_to_driver: false

output:
  root_dir: experiments
  run_name: ppo_self_play
